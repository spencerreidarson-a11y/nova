<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/nova_icon.png">
  <link rel="apple-touch-icon" href="/nova_icon.png">
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=Bodoni+Moda:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="color-scheme" content="dark">
  <title>Library</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="/topbar.js" defer></script>
</head>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255,255,255,0.04);
  --bg-input: rgba(0,0,0,0.28);
  --bg-input-focus: rgba(0,0,0,0.36);
  --border: rgba(255,255,255,0.06);
  --border-strong: rgba(255,255,255,0.12);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --font: -apple-system,BlinkMacSystemFont,"Inter","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --lime: #c2ef4e;
  --amber: #F5A623;
  --soft-red: #FF6B6B;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-secondary);
  font-family: var(--font);
  font-size: 15px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { min-height: 100vh; position: relative; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(60% 50% at 80% 12%, rgba(194,239,78,0.06) 0%, transparent 60%),
    radial-gradient(50% 40% at 15% 88%, rgba(180,180,220,0.07) 0%, transparent 60%);
  filter: blur(40px); pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-2%,2%); } }

main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 16px 20px 32px;
}

/* ── HEADER ─────────────────────────────────────────── */
.lib-header { margin-bottom: 24px; }
.lib-title {
  font-family: 'Bodoni Moda', serif;
  font-size: clamp(32px, 10vw, 48px);
  font-weight: 400; color: var(--text-primary);
  margin: 0 0 14px; letter-spacing: -0.01em; line-height: 1.1;
}
.lib-search {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 11px 18px;
  color: var(--text-primary); font-family: var(--font); font-size: 15px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
}
.lib-search:focus { border-color: var(--border-strong); background: var(--bg-input-focus); }
.lib-search::placeholder { color: var(--text-quaternary); }

/* ── SECTION ─────────────────────────────────────────── */
.lib-section { margin-bottom: 32px; }
.lib-section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.lib-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text-tertiary);
  font-family: var(--font-mono); flex: 1;
}
.lib-add-btn {
  background: none; border: none;
  color: var(--lime); font-size: 12px; font-weight: 600;
  cursor: pointer; padding: 4px 0;
  font-family: var(--font); letter-spacing: 0.01em;
  -webkit-tap-highlight-color: transparent; white-space: nowrap;
}
.lib-add-btn:hover { opacity: 0.8; }

/* ── GOALS GRID ─────────────────────────────────────── */
.goals-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media (max-width: 480px) {
  .goals-grid { grid-template-columns: 1fr; }
}
.goal-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-strong);
  border-left: 3px solid var(--lime);
  border-radius: 14px;
  overflow: hidden; cursor: pointer;
  transition: background 0.14s;
  -webkit-tap-highlight-color: transparent;
}
.goal-card--red   { border-left-color: var(--soft-red); }
.goal-card--amber { border-left-color: var(--amber); }
.goal-card--lime  { border-left-color: var(--lime); }
.goal-card:hover  { background: rgba(255,255,255,0.07); }
.goal-card-body   { padding: 16px 16px 14px; }
.goal-card-top {
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 8px;
  margin-bottom: 8px;
}
.goal-card-title {
  font-size: 16px; font-weight: 700; color: var(--text-primary);
  line-height: 1.3; margin: 0; flex: 1; min-width: 0;
  word-break: break-word;
}
.goal-card-desc {
  font-size: 12px; color: var(--text-tertiary);
  line-height: 1.55; margin: 0 0 10px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.goal-card-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding-top: 10px; border-top: 1px solid var(--border);
}

/* ── LIST ROWS ───────────────────────────────────────── */
.lib-list {
  display: flex; flex-direction: column;
  border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  background: var(--bg-card);
}
.lib-row {
  border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.lib-row:last-child { border-bottom: none; }
.lib-row:hover { background: rgba(255,255,255,0.03); }
.lib-row-main {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px;
}
.lib-row-text-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.lib-row-title {
  font-size: 14px; font-weight: 500; color: var(--text-primary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lib-row-snippet {
  font-size: 12px; color: var(--text-tertiary);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.lib-row-meta {
  font-size: 11px; color: var(--text-quaternary);
  font-family: var(--font-mono); white-space: nowrap; flex-shrink: 0;
}
.lib-empty {
  padding: 20px 16px;
  font-size: 13px; color: var(--text-quaternary);
  text-align: center; line-height: 1.5;
}

/* ── DEADLINE PILLS ──────────────────────────────────── */
.deadline-pill {
  display: inline-flex; align-items: center;
  font-size: 11px; font-weight: 600; font-family: var(--font-mono);
  padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
}
.pill-lime   { color: var(--lime);     background: rgba(194,239,78,0.12);  }
.pill-amber  { color: var(--amber);    background: rgba(245,166,35,0.12);  }
.pill-red    { color: var(--soft-red); background: rgba(255,107,107,0.12); }
.pill-muted  { color: var(--text-quaternary); background: rgba(255,255,255,0.06); }

/* ── GOAL EXPAND ─────────────────────────────────────── */
.goal-expand {
  padding: 0 16px 14px;
  border-top: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}
.goal-desc {
  font-size: 13px; color: var(--text-secondary);
  padding: 10px 0; white-space: pre-wrap; word-break: break-word;
}
.goal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.goal-action-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: 20px;
  cursor: pointer; font-family: var(--font);
  transition: border-color 0.12s, color 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.goal-action-btn:hover { border-color: var(--border-strong); color: var(--text-primary); }
.goal-action-delete { color: var(--soft-red); border-color: rgba(255,107,107,0.2); }
.goal-action-delete:hover { border-color: rgba(255,107,107,0.5); color: var(--soft-red); }

/* ── MODALS (bottom-sheet) ───────────────────────────── */
.lib-modal-bg {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.72);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: flex-end; justify-content: center;
}
.lib-modal-bg.show { display: flex; }
.lib-modal {
  background: #15151a;
  border: 1px solid var(--border-strong);
  border-radius: 22px 22px 0 0;
  padding: 24px 20px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  width: 100%; max-width: 560px;
  max-height: 92vh; overflow-y: auto; overscroll-behavior: contain;
}
.lib-modal-title {
  font-size: 17px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 20px;
}
.lib-field { margin-bottom: 16px; }
.lib-label {
  display: block;
  font-size: 11px; font-weight: 600; letter-spacing: 0.10em;
  text-transform: uppercase; color: var(--text-tertiary);
  font-family: var(--font-mono); margin-bottom: 6px;
}
.lib-input {
  width: 100%;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px;
  color: var(--text-primary); font-family: var(--font); font-size: 15px;
  outline: none; transition: border-color 0.15s; -webkit-appearance: none;
}
.lib-input:focus { border-color: var(--border-strong); }
.lib-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
input[type="date"].lib-input { color-scheme: dark; }
.lib-modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.lib-btn-cancel {
  flex: 1; height: 46px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 15px; font-weight: 600;
  border-radius: 12px; cursor: pointer; font-family: var(--font);
  transition: background 0.12s; -webkit-tap-highlight-color: transparent;
}
.lib-btn-cancel:hover { background: rgba(255,255,255,0.10); }
.lib-btn-save {
  flex: 2; height: 46px;
  background: linear-gradient(180deg, #ffffff 0%, #e8e5dd 100%);
  border: none; color: #0a0a0b;
  font-size: 15px; font-weight: 700;
  border-radius: 12px; cursor: pointer; font-family: var(--font);
  transition: opacity 0.12s; -webkit-tap-highlight-color: transparent;
}
.lib-btn-save:hover { opacity: 0.92; }

/* ── NOTE EDIT FULL-SCREEN ───────────────────────────── */
.lib-fullview-bg {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: #050506; flex-direction: column;
}
.lib-fullview-bg.show { display: flex; }
.lib-fullview {
  display: flex; flex-direction: column;
  width: 100%; height: 100%;
  padding-top: max(16px, env(safe-area-inset-top));
  padding-bottom: max(0px, env(safe-area-inset-bottom));
}
.lib-fullview-header {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.lib-fullview-close {
  background: none; border: none;
  color: var(--text-tertiary); font-size: 22px; line-height: 1;
  cursor: pointer; padding: 2px 6px; flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.lib-fullview-close:hover { color: var(--text-primary); }
.note-title-input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 16px; font-weight: 600; color: var(--text-primary);
  font-family: var(--font); padding: 0; min-width: 0;
  -webkit-appearance: none;
}
.note-title-input::placeholder { color: var(--text-quaternary); }
.note-save-status {
  font-size: 11px; color: var(--text-quaternary);
  font-family: var(--font-mono); flex-shrink: 0; min-width: 40px;
  text-align: right;
}
.note-delete-btn {
  background: none; border: none;
  color: var(--soft-red); font-size: 13px; font-weight: 600;
  cursor: pointer; padding: 4px 8px; flex-shrink: 0;
  font-family: var(--font); -webkit-tap-highlight-color: transparent;
}
.note-delete-btn:hover { opacity: 0.8; }
.note-body-textarea {
  flex: 1; overflow-y: auto; overscroll-behavior: contain;
  padding: 18px 20px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
  resize: none; border: none; outline: none; background: none;
  color: var(--text-secondary); font-family: var(--font);
  font-size: 15px; line-height: 1.75;
  width: 100%; max-width: 680px; margin: 0 auto; display: block;
}

@media (max-width: 480px) {
  main { padding: 12px 14px 28px; }
  .lib-title { margin-bottom: 12px; }
}
</style>
<body>
<main>

  <div class="lib-header">
    <h1 class="lib-title">Library</h1>
    <input type="search" id="libSearch" class="lib-search" placeholder="search anything..." autocomplete="off" autocorrect="off">
  </div>

  <!-- GOALS -->
  <div class="lib-section" id="goalsSection">
    <div class="lib-section-head">
      <span class="lib-eyebrow">Goals</span>
      <button class="lib-add-btn" id="addGoalBtn">+ Add goal</button>
    </div>
    <div id="goalsList" class="goals-grid">
      <div class="lib-empty">Loading…</div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="lib-section" id="notesSection">
    <div class="lib-section-head">
      <span class="lib-eyebrow">Notes</span>
      <button class="lib-add-btn" id="addNoteBtn">+ New note</button>
    </div>
    <div id="notesList" class="lib-list">
      <div class="lib-empty">Loading…</div>
    </div>
  </div>

</main>

<!-- GOAL ADD/EDIT MODAL -->
<div class="lib-modal-bg" id="goalModalBg" role="dialog" aria-modal="true" aria-labelledby="goalModalTitle">
  <div class="lib-modal">
    <div class="lib-modal-title" id="goalModalTitle">Add Goal</div>
    <div class="lib-field">
      <label class="lib-label" for="goalTitleInput">Title</label>
      <input type="text" id="goalTitleInput" class="lib-input" placeholder="What do you want to achieve?" autocomplete="off">
    </div>
    <div class="lib-field">
      <label class="lib-label" for="goalDescInput">Description</label>
      <textarea id="goalDescInput" class="lib-input lib-textarea" placeholder="Optional notes…" rows="3"></textarea>
    </div>
    <div class="lib-field">
      <label class="lib-label" for="goalDeadlineInput">Deadline</label>
      <input type="date" id="goalDeadlineInput" class="lib-input">
    </div>
    <div class="lib-modal-btns">
      <button class="lib-btn-cancel" id="goalModalCancel">Cancel</button>
      <button class="lib-btn-save" id="goalModalSave">Save</button>
    </div>
  </div>
</div>

<!-- NOTE EDIT FULL-SCREEN -->
<div class="lib-fullview-bg" id="fullviewBg" role="dialog" aria-modal="true" aria-label="Edit note">
  <div class="lib-fullview">
    <div class="lib-fullview-header">
      <button class="lib-fullview-close" id="fullviewClose" aria-label="Back">←</button>
      <input type="text" class="note-title-input" id="noteEditTitle" placeholder="Title" autocomplete="off">
      <span class="note-save-status" id="noteSaveStatus"></span>
      <button class="note-delete-btn" id="noteDeleteBtn">Delete</button>
    </div>
    <textarea class="note-body-textarea" id="noteEditBody" placeholder="Start writing…"></textarea>
  </div>
</div>

<script>
(function () {
  'use strict';

  const SUPA_URL = 'https://gmmmrfldwjwbektgbifq.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdtbW1yZmxkd2p3YmVrdGdiaWZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDA5NTQsImV4cCI6MjA5NjA3Njk1NH0.sTUJrqcAwkl3lzbcGMU_0Gc5S_Vth0WxvfF6YU8rlJc';
  const sb = window.supabase ? window.supabase.createClient(SUPA_URL, SUPA_KEY) : null;

  let goals = [];
  let nativeNotes = [];
  let editingGoalId = null;
  let currentNote = null;
  let saveTimer = null;
  let searchQuery = '';

  // ── HELPERS ──────────────────────────────────────────
  function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function relDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date();
    const days = Math.floor((now - d) / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    if (days < 7) return days + 'd ago';
    const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return m[d.getMonth()] + ' ' + d.getDate();
  }
  function deadlinePill(deadline) {
    if (!deadline) return '';
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const due = new Date(deadline + 'T00:00:00');
    const days = Math.round((due - today) / 86400000);
    const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr = m[due.getMonth()] + ' ' + due.getDate();
    let cls, label;
    if (days < 0)       { cls = 'pill-red';   label = Math.abs(days) + 'd overdue'; }
    else if (days < 7)  { cls = 'pill-red';   label = days + 'd left'; }
    else if (days < 30) { cls = 'pill-amber'; label = days + 'd left'; }
    else                { cls = 'pill-lime';  label = days + 'd left'; }
    return '<span class="deadline-pill ' + cls + '">' + dateStr + ' · ' + label + '</span>';
  }
  function matchesQ(texts) {
    if (!searchQuery) return true;
    return texts.some(function (t) { return t && t.toLowerCase().indexOf(searchQuery) !== -1; });
  }

  // ── DATA LOAD ────────────────────────────────────────
  async function loadGoals() {
    if (!sb) return;
    const r = await sb.from('goals').select('*').eq('status', 'active').order('created_at', { ascending: false });
    goals = r.data || [];
  }
  async function loadNotes() {
    if (!sb) return;
    const r = await sb.from('library_notes').select('*').eq('source', 'native').order('updated_at', { ascending: false });
    nativeNotes = r.data || [];
  }

  // ── RENDER GOALS ─────────────────────────────────────
  function goalAccentClass(deadline) {
    if (!deadline) return 'goal-card--lime';
    var today = new Date(); today.setHours(0, 0, 0, 0);
    var days = Math.round((new Date(deadline + 'T00:00:00') - today) / 86400000);
    if (days < 7)  return 'goal-card--red';
    if (days < 30) return 'goal-card--amber';
    return 'goal-card--lime';
  }

  function renderGoals(filter) {
    var list = document.getElementById('goalsList');
    var section = document.getElementById('goalsSection');
    var filtered = goals.filter(function (g) { return matchesQ([g.title, g.description]); });
    if (filter && filtered.length === 0) { section.style.display = 'none'; return; }
    section.style.display = '';
    if (filtered.length === 0) {
      list.innerHTML = '<div class="lib-empty">No goals yet. Tap "+ Add goal" to create one.</div>';
      return;
    }
    list.innerHTML = filtered.map(function (g) {
      return '<div class="goal-card ' + goalAccentClass(g.deadline) + '" data-id="' + esc(g.id) + '">' +
        '<div class="goal-card-body">' +
          '<div class="goal-card-top">' +
            '<h2 class="goal-card-title">' + esc(g.title) + '</h2>' +
            deadlinePill(g.deadline) +
          '</div>' +
          (g.description ? '<p class="goal-card-desc">' + esc(g.description) + '</p>' : '') +
          '<div class="goal-card-actions" style="display:none">' +
            '<button class="goal-action-btn" data-action="edit" data-id="' + esc(g.id) + '">Edit</button>' +
            '<button class="goal-action-btn" data-action="archive" data-id="' + esc(g.id) + '">Archive</button>' +
            '<button class="goal-action-btn goal-action-delete" data-action="delete" data-id="' + esc(g.id) + '">Delete</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    list.querySelectorAll('.goal-card').forEach(function (card) {
      card.querySelector('.goal-card-body').addEventListener('click', function () {
        var acts = card.querySelector('.goal-card-actions');
        var isOpen = acts.style.display !== 'none';
        list.querySelectorAll('.goal-card-actions').forEach(function (a) { a.style.display = 'none'; });
        acts.style.display = isOpen ? 'none' : 'flex';
      });
    });
    list.querySelectorAll('[data-action]').forEach(function (btn) {
      btn.addEventListener('click', function (e) {
        e.stopPropagation();
        var id = btn.dataset.id, action = btn.dataset.action;
        if (action === 'edit') openGoalModal(id);
        else if (action === 'archive') archiveGoal(id);
        else if (action === 'delete') deleteGoal(id);
      });
    });
  }

  // ── RENDER NOTES ─────────────────────────────────────
  function renderNotes(filter) {
    const list = document.getElementById('notesList');
    const section = document.getElementById('notesSection');
    const filtered = nativeNotes.filter(function (n) { return matchesQ([n.title, n.body]); });
    if (filter && filtered.length === 0) { section.style.display = 'none'; return; }
    section.style.display = '';
    if (filtered.length === 0) {
      list.innerHTML = '<div class="lib-empty">No notes yet. Tap "+ New note" to create one.</div>';
      return;
    }
    list.innerHTML = filtered.map(function (n) {
      const snippet = (n.body || '').trim().slice(0, 80);
      return '<div class="lib-row" data-id="' + esc(n.id) + '">' +
        '<div class="lib-row-main">' +
          '<div class="lib-row-text-col">' +
            '<span class="lib-row-title">' + (n.title ? esc(n.title) : '<em style="color:var(--text-quaternary)">Untitled</em>') + '</span>' +
            (snippet ? '<span class="lib-row-snippet">' + esc(snippet) + '</span>' : '') +
          '</div>' +
          '<span class="lib-row-meta">' + relDate(n.updated_at) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
    list.querySelectorAll('.lib-row[data-id]').forEach(function (row) {
      row.addEventListener('click', function () {
        const note = nativeNotes.find(function (n) { return n.id === row.dataset.id; });
        if (note) openNoteEdit(note);
      });
    });
  }

  function renderAll() {
    const filter = !!searchQuery;
    renderGoals(filter);
    renderNotes(filter);
  }

  // ── GOAL CRUD ────────────────────────────────────────
  async function addGoal(title, description, deadline) {
    if (!sb) return;
    const r = await sb.from('goals').insert({ title, description: description || null, deadline: deadline || null }).select().single();
    if (r.data) goals.unshift(r.data);
    renderGoals(false);
  }
  async function updateGoal(id, patch) {
    if (!sb) return;
    await sb.from('goals').update(patch).eq('id', id);
    const idx = goals.findIndex(function (g) { return g.id === id; });
    if (idx !== -1) goals[idx] = Object.assign({}, goals[idx], patch);
    renderGoals(false);
  }
  async function archiveGoal(id) {
    if (!sb) return;
    await sb.from('goals').update({ status: 'archived' }).eq('id', id);
    goals = goals.filter(function (g) { return g.id !== id; });
    renderGoals(false);
  }
  async function deleteGoal(id) {
    if (!sb || !confirm('Delete this goal permanently?')) return;
    await sb.from('goals').delete().eq('id', id);
    goals = goals.filter(function (g) { return g.id !== id; });
    renderGoals(false);
  }

  // ── NATIVE NOTES ─────────────────────────────────────
  async function createNote() {
    if (!sb) return;
    const now = new Date().toISOString();
    const r = await sb.from('library_notes').insert({ source: 'native', title: '', body: '', updated_at: now }).select().single();
    if (r.data) { nativeNotes.unshift(r.data); openNoteEdit(r.data); }
  }

  function openNoteEdit(note) {
    currentNote = Object.assign({}, note);
    document.getElementById('noteEditTitle').value = note.title || '';
    document.getElementById('noteEditBody').value = note.body || '';
    document.getElementById('noteSaveStatus').textContent = '';
    openModal('fullviewBg');
    setTimeout(function () {
      const t = document.getElementById('noteEditTitle');
      if (!t.value) t.focus(); else document.getElementById('noteEditBody').focus();
    }, 60);
  }

  function scheduleAutoSave() {
    document.getElementById('noteSaveStatus').textContent = '…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveCurrentNote, 1000);
  }

  async function saveCurrentNote() {
    if (!currentNote || !sb) return;
    const now = new Date().toISOString();
    await sb.from('library_notes').update({ title: currentNote.title, body: currentNote.body, updated_at: now }).eq('id', currentNote.id);
    const idx = nativeNotes.findIndex(function (n) { return n.id === currentNote.id; });
    if (idx !== -1) {
      nativeNotes[idx].title = currentNote.title;
      nativeNotes[idx].body = currentNote.body;
      nativeNotes[idx].updated_at = now;
    }
    const statusEl = document.getElementById('noteSaveStatus');
    if (statusEl) {
      statusEl.textContent = 'Saved';
      setTimeout(function () { statusEl.textContent = ''; }, 1500);
    }
  }

  async function deleteNote(id) {
    if (!confirm('Delete this note?') || !sb) return;
    await sb.from('library_notes').delete().eq('id', id);
    nativeNotes = nativeNotes.filter(function (n) { return n.id !== id; });
    closeModal('fullviewBg');
    currentNote = null;
    renderNotes(false);
  }

  // ── MODALS ───────────────────────────────────────────
  function openModal(id) {
    document.getElementById(id).classList.add('show');
    document.body.classList.add('topbar-modal-open');
  }
  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
    if (!document.querySelector('.lib-modal-bg.show, .lib-fullview-bg.show')) {
      document.body.classList.remove('topbar-modal-open');
    }
  }

  function openGoalModal(id) {
    editingGoalId = id || null;
    const titleEl = document.getElementById('goalModalTitle');
    const tIn = document.getElementById('goalTitleInput');
    const dIn = document.getElementById('goalDescInput');
    const dlIn = document.getElementById('goalDeadlineInput');
    if (id) {
      const g = goals.find(function (x) { return x.id === id; });
      titleEl.textContent = 'Edit Goal';
      tIn.value = g.title || ''; dIn.value = g.description || ''; dlIn.value = g.deadline || '';
    } else {
      titleEl.textContent = 'Add Goal';
      tIn.value = ''; dIn.value = ''; dlIn.value = '';
    }
    openModal('goalModalBg');
    setTimeout(function () { tIn.focus(); }, 60);
  }

  // ── INIT ─────────────────────────────────────────────
  async function init() {
    // Goal modal
    document.getElementById('addGoalBtn').addEventListener('click', function () { openGoalModal(null); });
    document.getElementById('goalModalCancel').addEventListener('click', function () { closeModal('goalModalBg'); });
    document.getElementById('goalModalSave').addEventListener('click', async function () {
      const title = document.getElementById('goalTitleInput').value.trim();
      if (!title) { document.getElementById('goalTitleInput').focus(); return; }
      const desc = document.getElementById('goalDescInput').value.trim();
      const deadline = document.getElementById('goalDeadlineInput').value;
      closeModal('goalModalBg');
      if (editingGoalId) await updateGoal(editingGoalId, { title, description: desc || null, deadline: deadline || null });
      else await addGoal(title, desc, deadline);
    });
    document.getElementById('goalModalBg').addEventListener('click', function (e) {
      if (e.target.id === 'goalModalBg') closeModal('goalModalBg');
    });

    // Note edit
    document.getElementById('addNoteBtn').addEventListener('click', createNote);
    document.getElementById('noteEditTitle').addEventListener('input', function (e) {
      if (currentNote) { currentNote.title = e.target.value; scheduleAutoSave(); }
    });
    document.getElementById('noteEditBody').addEventListener('input', function (e) {
      if (currentNote) { currentNote.body = e.target.value; scheduleAutoSave(); }
    });
    document.getElementById('noteDeleteBtn').addEventListener('click', function () {
      if (currentNote) deleteNote(currentNote.id);
    });
    document.getElementById('fullviewClose').addEventListener('click', function () {
      clearTimeout(saveTimer);
      if (currentNote) saveCurrentNote();
      closeModal('fullviewBg');
      currentNote = null;
      renderNotes(false);
    });

    // Search
    document.getElementById('libSearch').addEventListener('input', function (e) {
      searchQuery = e.target.value.toLowerCase();
      renderAll();
    });

    // Load
    await Promise.all([loadGoals(), loadNotes()]);
    renderAll();
  }

  init();
})();
</script>
</body>
</html>
